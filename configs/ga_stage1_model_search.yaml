# Stage 1: model-family search GA.
# Mutates combo_key (architecture) + params together. Finds the best *family*.

data:
  images_dir: data/images
  masks_dir: data/masks
  val_split: 0.15
  hard_eval_dir: null                # set to a dir of hard scenes if you have one
  seed: 42

fitness:
  metric: composite                  # iou | boundary_f1 | composite
  iou_weight: 1.0
  boundary_f1_weight: 0.5
  tv_smoothness_penalty: 0.1
  proxy_budget: epochs
  proxy_epochs: 8                    # short proxy per individual — crank up for final search
  early_kill_iou: 0.10
  early_kill_at_fraction: 0.35

ga:
  stage: stage1_model
  population_size: 12
  generations: 10
  elite_count: 2
  tournament_k: 3
  crossover_prob: 0.7
  mutation_prob: 0.3
  combo_mutation_rate: 0.05          # low: combo changes are expensive
  param_mutation_rate: 0.3
  combo_pool: null                   # null = all 18; you can restrict to a subset
  fixed_combo: null                  # null in stage1
  # Preserve architectural diversity — never let any one combo dominate the population
  niching_quota:
    "01_dinov2_l_m2f": 3
    "02_dinov2_g_upernet": 2
    "03_sam2_encoder_m2f": 3
    "04_sam2_full_finetune": 2
    "05_eva02_l_m2f": 2
    "06_internimage_l_upernet": 2
    "07_swinv2_l_m2f": 3
    "08_convnextv2_l_upernet": 2
    "09_segformer_b5_premium": 3
    "10_m2f_segformer_b5": 2
    "11_unetpp_b7": 3
    "12_modnet_matting": 2
    "13_beitv2_l_m2f": 2
    "14_ensemble_dino_sam2_segformer": 1
    "15_cascade_sam2_segformer": 1
    "16_sam_hq": 2
    "17_dinov2_l_unetpp_decoder": 2
    "18_segnext_l_mscan": 2
  seed: 42
  max_retries_per_individual: 1

runtime:
  output_dir: runs/ga/stage1
  checkpoint_every_gen: 1
  resume_from: null
  n_gpus: 1
  parallel_workers: 1                # bump to n_gpus if you have multi-GPU
  per_worker_gpu: null
  dry_run: false
  log_to_tensorboard: true
  log_to_csv: true
  timeout_per_individual_minutes: 180
