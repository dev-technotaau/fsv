# Hard-positive top-up scrape — EXTENDS data_scraped/ past 17,004.
# Robust coverage across 18 explicit hard-positive categories.
#
# Same dedup DB as the original positive run (data_scraped/dedup.sqlite), so
# URL-seen and SHA checks automatically prevent duplicates with existing 17k.
# Vision ON at relaxed threshold 0.4 (hard positives intentionally have low
# fence-label confidence) — uses Cloud credits via Vertex.
#
# Hard-positive distribution (191 curated queries, target ~5,000 new saves):
#   15  extreme occlusion       (fence 50-80% hidden by plants/snow/crops)
#   15  challenging lighting    (backlit, night, dramatic shadows, twilight)
#   12  extreme angles          (worm's-eye, aerial, oblique, fisheye)
#   15  partial / damaged       (broken, rotting, under construction, mid-stain)
#   12  complex backgrounds     (cluttered, chaotic, many distractors)
#   10  scale extremes          (macro + telephoto + wide landscape)
#   12  multi-structure context (fence + shed + pergola + deck etc.)
#   12  weather extremes        (heavy snow, storm, fog, ice, hurricane)
#   12  staining mid-process    (half-stained, drips, touch-ups, samples)
#   10  multi-fence / corners   (two fences meeting, parallel fences)
#    8  motion blur / focus     (pans, bokeh, shallow DOF, tilt-shift)
#   12  painted / non-natural   (white/red/blue/black paint, peeling, graffiti)
#    6  biological growth       (moss, algae, lichen, fungi on fence)
#    8  reflections / water     (fence in ponds/puddles, rain streaks)
#   10  multi-class boundary    (fence meeting grass/concrete/gravel/pavers — CRUCIAL)
#    8  urban / run-down        (alley graffiti, abandoned, industrial grunge)
#    8  slope / curved          (hillside, stepped, arched, wrapping)
#    6  incidental background   (portrait/wedding/pet with fence behind)

runtime:
  target_total_images: 22000         # was 17004 → +~5000 hard positives
  download_workers: 16
  download_timeout_s: 15
  max_retries: 2
  progress_interval_s: 5.0
  output_root: data_scraped          # SAME as positive run (extends dataset)
  dry_run: false
  log_level: INFO
  log_file: data_scraped/scraper.log.jsonl
  log_format: plain
  min_free_disk_gb: 2.0
  disk_check_interval_s: 30.0
  max_image_megapixels: 100

proxy:
  enabled: false
  proxies: []
  failure_cool_down_s: 300.0

circuit_breaker:
  enabled: true
  failure_threshold: 5
  cool_down_s: 60.0

content_filter:
  enabled: true
  extra_block_keywords: []
  extra_block_domains: []

query_priority:
  enabled: true
  target_per_query: 80

distributed:
  enabled: false
  redis_url: ${REDIS_URL}
  key_prefix: "fence_scraper:"

batched_writer:
  enabled: true
  batch_size: 50
  flush_interval_s: 0.5

# Static/Gemini disabled — those already ran in the positive scrape. Only the
# curated hard-positive queries below run (125 fresh prompts).
queries:
  use_static: false
  use_gemini_expansion: false
  gemini_api_key: ${GEMINI_API_KEY}
  gemini_target_extra: 0
  custom:
    # ───────────── CATEGORY 1: Extreme occlusion (15 queries) ─────────────
    # Fence 50-80% hidden by plants, snow, or terrain
    - "cedar fence barely visible behind dense hedge"
