# ───────────────────────── PAID ─────────────────────────

google_cse:
  enabled: false
  api_key: ${GOOGLE_CSE_API_KEY}
  cx: ${GOOGLE_CSE_CX}
  rate_limit_per_minute: 30
  max_concurrent: 4
  target_images: 3000

# VISION ENABLED — Vertex AI → Cloud credits.
# Threshold lowered to 0.4 (from 0.6) because hard positives intentionally have
# low fence-label confidence (heavy occlusion, partial visibility, unusual angles,
# extreme lighting). 0.6 would reject ~30-50% of valid hard positives. 0.4 still
# filters clearly off-topic results but keeps the edge cases we actually want.
google_vision:
  enabled: true
  credentials_json: ${GOOGLE_APPLICATION_CREDENTIALS}
  min_fence_confidence: 0.4
  sample_rate: 1.0
  batch_size: 10
  batch_timeout_ms: 500
  labels_to_accept:
    # ── Direct fence-family ──
    - Fence
    - Picket fence
    - Home fencing
    - Wall
    # ── Wood / material (common top label for close-ups) ──
    - Wood
    - Lumber                # board/plank-level shots
    - Plank                 # fence-board close-ups, wood-grain macros
    - Hardwood
    # ── Fence-adjacent wooden structures (common in positive scenes) ──
    - Gate                  # fence gates (may be dominant over "Fence")
    - Deck                  # fences + deck combos
    - Pergola               # fences + pergola
    - Arbor                 # fences + arbor
    - Lattice               # lattice-top fences, trellises
    # ── Context / setting (outdoor fence scenes) ──
    - Yard
    - Backyard
    - Lawn
    - Garden
    - Landscape
    - Outdoor
    - Property
    - Rural area            # farm/pasture fences
    # ── Occluders / foreground (heavy-occlusion fence queries) ──
    - Plant                 # fence-behind-plants queries
    - Tree
    - Shrub
    - Hedge
    - Flower                # fences with flowers in front (very common)
    - Flowering plant
    - Leaf                  # autumn/foliage occlusion
    - Ivy                   # climbing ivy on fences
    - Vine                  # similar
    # ── Weather / lighting extremes ──
    - Snow
    - Fog
    - Winter
    - Rain

