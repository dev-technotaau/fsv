    tier: distractor
    priority: 40
    color: [140, 95, 60]          # warm mid-brown (distinct from fence_wood_gate @160/100/50)
    is_staining_target: false
    # A wooden gate with NO attached fence (e.g., an archway gate between hedges,
    # a freestanding garden gate, a wooden entrance gate framed by stone walls).
    # Distinct from fence_wood_gate (class 3, staining target) which is integrated
    # into a fence line. Distractor tier — the stainer should NOT paint these,
    # since the product scope is fences, not standalone architectural gates.
    prompts:
      # Only unambiguous wooden gates. The previous list had
      # "arched wooden gate", "wooden gate between stone walls", etc. which
      # DINO matched to literal stone archways (ignoring "wooden") and ate
      # 375k-pixel chunks of masonry architecture in wikimedia garden-gate photos.
      - "standalone wooden garden gate"
      - "freestanding wooden gate"
      - "wooden garden gate with no fence"
      - "wooden entrance gate alone"
      - "wooden garden door standalone"
      - "rustic wooden gate isolated"
