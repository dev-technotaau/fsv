      - "transparent pool fence"
      - "clear plexiglass fence"
      - "acrylic fence panel"
      - "glass panel fence"
      - "glass balcony fence"
      - "glass deck railing"
      - "tempered glass fence"
      - "glass wall fence outdoor"
    box_threshold: 0.40                # raised from 0.32 — firing at 0.40 on
                                       # white vinyl fences (a0f0c8d8) with low
                                       # confidence; real glass pool fences
                                       # score 0.45+ so strict cutoff is safe.
    text_threshold: 0.30

  - id: 24
    name: logo_watermark
    tier: occluder
    priority: 45                 # LOWERED from 82 — at 82 false-positive logo
                                 # detections on cedar wood grain were overwriting
                                 # fence_wood(50)/fence_wood_post(55)/fence_wood_gate(52)
                                 # and producing all-magenta fence viz. At 45, any
                                 # real wood fence pixels win on overlap — cost is
                                 # that a true watermark covering fence won't paint
                                 # over it, which is acceptable for our dataset
                                 # (client photos rarely have watermarks).
    color: [255, 0, 255]          # magenta — visually obvious in viz PNGs
    is_staining_target: false
    # Image overlays that aren't part of the physical scene: stock-photo watermarks,
    # company logos, signatures, URL overlays, social-media attribution. Common in
    # scraped data from pw_pinterest, pw_houzz, company_sites sources. Must NOT be
    # painted-over by the stainer (fence pixels behind a watermark shouldn't be
    # classified as fence_wood, or the visualizer would generate weird colors
    # under the watermark).
    prompts:
      # Stock-photo watermarks — specific brand names only. Generic "watermark
      # on image" and "text overlay" were matching cedar wood grain (repeating
      # vertical lines read as "text" to Grounding DINO), so those are out.
      - "shutterstock watermark logo"
      - "istock watermark logo"
      - "getty images watermark logo"
      - "adobe stock watermark logo"
      - "dreamstime watermark logo"
      - "alamy watermark logo"
      # Company / branding — must be an identifiable logo, not any text
      - "fence company logo overlay corner"
      - "real estate company logo overlay"
      # Social media attribution
      - "instagram handle watermark"
      - "pinterest watermark logo"
      # Logos physically on the fence (painted/stuck on)
      - "company logo sign attached to fence"
      - "business name sign mounted on fence"
      - "sticker decal attached to fence"
    box_threshold: 0.50                # raised further — 0.49 false positives
                                       # on wooden shadowbox fence (40aca171)
                                       # still painting fence magenta. Real
                                       # brand watermarks typically score 0.55+
                                       # so 0.50 is safe.
    text_threshold: 0.34

# Class ID 0 is BACKGROUND (reserved) — unlabeled pixels after all classes applied.

# ─────────────────────────────────────────────────────────────────────────
# PIPELINE HYPERPARAMETERS
# ─────────────────────────────────────────────────────────────────────────

pipeline:
  # Grounding DINO
  grounding_dino:
    model: "IDEA-Research/grounding-dino-base"     # max-accuracy variant (~680M params)
    max_text_prompt_length: 256
    batch_prompts_per_call: 4         # kept small so joined phrases stay under Grounding DINO's 256-token text-position-embedding cap
    # Combine prompts from multiple classes into a single call using "class_a . class_b . class_c ." format
    # Grounding DINO handles multi-class text-prompted detection natively.

  # SAM 2
  sam2:
    model: "facebook/sam2.1-hiera-large" # SAM 2.1 (Sept 2024 update) — sharper
                                         # boundaries, better on thin structures.
                                         # Fallback to sam2-hiera-large if unavailable.
    points_per_batch: 64
    multimask_output: true               # SAM 2 returns 3 candidate masks; pick best IoU
    mask_threshold: 0.0                  # raw SAM output threshold (final binary via > 0)

  # Filtering
  min_mask_area_pixels: 256              # drop masks smaller than this (noise)
  min_mask_area_ratio: 0.0005            # and below this fraction of image area
  max_boxes_per_class_per_image: 20      # cap detections per class (prevent prompt spam)

  # Fusion
  iou_merge_threshold: 0.80              # if two same-class boxes overlap by this much, merge them
  overlap_priority_strategy: "winner_takes_pixel"
  # Valid: "winner_takes_pixel" (simple priority), "soft_blend" (alpha), "inverse_depth" (priority × confidence)

# ─────────────────────────────────────────────────────────────────────────
# QA CONFIDENCE THRESHOLDS
# ─────────────────────────────────────────────────────────────────────────

qa:
  # Per-image confidence scoring — images below these thresholds queued for
  # human review.
  min_overall_confidence: 0.55           # weighted mean of all mask confidences
  min_fence_wood_confidence_for_positives: 0.40   # positive-class images should detect fence
  flag_no_detections: true               # images with zero detections get auto-flagged
  flag_if_fence_wood_missing_in_positive: true
  sample_rate_for_qa: 0.10               # 10% of all images get queued regardless of score
