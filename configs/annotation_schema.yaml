      # canopy" / "tree leaves" matched backgrounds too and ate ~50% of each
      # image after priority fusion. Background trees belong in
      # vegetation_background (priority 20), not here.
      - "tree branches in front of fence"
      # removed "tree trunk in front of fence" — cedar board-on-board fence
      # slats have wood-grain bark-like texture that matched "tree trunk",
      # causing veg_occluder to paint cedar fences green (see 6d79ddb4 viz).
      # Tree trunks are narrow and rarely dominate fence occlusion anyway.
      - "overhanging tree branch over fence"
      - "leaves covering part of fence"
      # Shrubs / bushes / climbers — must be in front of / on fence
      - "bush in front of fence"
      - "shrub in front of fence"
      - "climbing vines on fence"
      - "ivy covering fence"
      - "flowering plant in front of fence"
      - "pampas grass plume in front of fence"
