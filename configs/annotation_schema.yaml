# ═════════════════════════════════════════════════════════════════════════
# MULTI-CLASS ANNOTATION SCHEMA — Grounded-SAM 2 Pipeline
# ═════════════════════════════════════════════════════════════════════════
# 20 classes organized into 5 functional tiers. Every pixel of every image
# (positives + negatives) gets one class label. Priority resolution handles
# overlapping detections — higher-priority classes win the pixel.
#
# Design principles:
#   - "Functional classes" — what does this pixel DO in the scene, not just
#     what IS it
#   - Fine-grained fence materials for robustness across deployment
#   - Occluders are top priority so we never paint stain over a dog/plant
#   - Ground/sky/building as context so model learns scene-level reasoning
#   - Gap-between-slats is handled at SAM level (natural mask shape)
#
# Class ID 0 is always BACKGROUND (unlabeled pixels).
# All classes below have ID 1-19.

version: "1.0.0"

# ─────────────────────────────────────────────────────────────────────────
# CLASS DEFINITIONS
# Priority: higher value = wins pixel when multiple classes overlap.
# Fusion rule: paint low-priority masks first, then overlay higher-priority
# masks on top so occluders (trees, humans) beat fence underneath.
# ─────────────────────────────────────────────────────────────────────────

classes:

  # ═══ TIER 1: FENCE CLASSES (main target for model) ═══

  - id: 1
    name: fence_wood
    tier: fence
    priority: 50
    color: [139, 90, 43]        # cedar brown
    is_staining_target: true    # what the stainer visualizes color on
    prompts:
      - "wood fence"
      - "wooden fence"
      - "cedar fence"
      - "picket fence"
      - "wooden privacy fence"
      - "wooden plank fence"
      - "wood board fence"
      - "wooden shadowbox fence"
      - "stockade fence"
      - "board on board wooden fence"
      - "horizontal slat wood fence"
      - "wooden split rail fence"
      - "painted wooden fence"
      # Cedar-specific variants — boost DINO's match confidence on
      # cedar fences so they get detected at >=0.30 and the fence-
      # preservation fusion rule protects them from vegetation_occluder.
      - "cedar horizontal slat privacy fence"
      - "modern horizontal cedar plank fence"
      - "cedar board and batten fence"
      - "close-up cedar fence texture wood grain"
      - "vertical cedar plank privacy fence"
    box_threshold: 0.28
    text_threshold: 0.22

