# Negative-dataset scraper config. COMPLETELY SEPARATE from the positive run —
# different output dirs, different dedup DB, different queries, Vision OFF.
#
# Negative distribution (12,000 total, ~70% of 17k positives) across 10 categories:
#   Pure negatives                (35 queries)   no fence at all
#   Wood non-fence structures     (45 queries)   railings, pergolas, trellises, siding, louvers
#   Non-wood fences               (30 queries)   vinyl, chain-link, iron — can't be stained
#   Masonry walls                 (25 queries)   brick, stone, concrete, retaining
#   Natural fence-like            (25 queries)   hedges, bamboo, tree rows
#   Empty outdoor scenes          (20 queries)   backyards/fields without fence
#   Wooden gates standalone       (12 queries)   isolated gate ≠ fence
#   Wooden bridges / boardwalks   (12 queries)   slatted rails, not fences
#   Isolated wooden posts         (10 queries)   single posts (mailbox, sign, flag)
#   Slatted outdoor furniture     (12 queries)   Adirondack chairs, slat benches
# ═══ TOTAL: 226 queries across 10 hard-neg + pure-neg categories ═══

runtime:
  target_total_images: 12000
  download_workers: 16
  download_timeout_s: 15
  max_retries: 2
  progress_interval_s: 5.0
  output_root: data_scraped_neg          # SEPARATE from positive's data_scraped/
  dry_run: false
  log_level: INFO
  log_file: data_scraped_neg/scraper.log.jsonl
  log_format: plain
  min_free_disk_gb: 2.0
  disk_check_interval_s: 30.0
  max_image_megapixels: 100

proxy:
  enabled: false
  proxies: []
  failure_cool_down_s: 300.0

circuit_breaker:
  enabled: true
  failure_threshold: 5
  cool_down_s: 60.0

content_filter:
  enabled: true
  extra_block_keywords: []
  extra_block_domains: []

query_priority:
  enabled: true
  target_per_query: 80

distributed:
  enabled: false
  redis_url: ${REDIS_URL}
  key_prefix: "fence_scraper_neg:"

batched_writer:
  enabled: true
  batch_size: 50
  flush_interval_s: 0.5

# CRITICAL: disable the fence-focused static corpus + Gemini (prompt is fence-only).
