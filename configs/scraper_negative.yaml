quality:
  min_width: 800
  min_height: 600
  max_width: 8000
  max_height: 8000
  min_aspect: 0.4
  max_aspect: 2.5
  min_bytes: 40000
  max_bytes: 25000000

dedup:
  phash_hamming_threshold: 5
  db_path: data_scraped_neg/dedup.sqlite  # SEPARATE dedup DB — no cross-contamination

storage:
  images_dir: data_scraped_neg/images
  metadata_jsonl: data_scraped_neg/metadata.jsonl
  failed_log: data_scraped_neg/failures.jsonl
  file_extension: jpg

# ───────────────────────── PAID ─────────────────────────

google_cse:
  enabled: false
  api_key: ${GOOGLE_CSE_API_KEY}
  cx: ${GOOGLE_CSE_CX}
  rate_limit_per_minute: 30
  max_concurrent: 4
  target_images: 3000

# VISION OFF FOR NEGATIVES: the labels_to_accept list (Fence, Picket fence, Wood,
# Yard, Wall, Garden, Landscape, Outdoor) would wrongly accept many negatives as
# positives or wrongly reject pure negatives. Rely on query specificity instead.
# Optional post-hoc Fence-detection QA pass can be added later if needed.
google_vision:
  enabled: false
  credentials_json: ${GOOGLE_APPLICATION_CREDENTIALS}
  min_fence_confidence: 0.6
  sample_rate: 1.0
  batch_size: 10
  batch_timeout_ms: 500
  labels_to_accept:
    - Fence
    - Wood
    - Garden
    - Outdoor

# ───────────────────────── FREE WITH API KEY ─────────────────────────

pexels:
  enabled: true
  api_key: ${PEXELS_API_KEY}
  rate_limit_per_minute: 200
  max_concurrent: 4
  target_images: 3000

